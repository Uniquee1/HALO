<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Pass</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="container">
        <h2>Event Manager</h2>
        
        <div class="tabs">
            <button onclick="showTab('create')">Create Event</button>
            <button onclick="showTab('scan')">Scanner</button>
        </div>

        <div id="create-section" class="tab-content">
            <input type="text" id="event-name" placeholder="Event Name">
            <input type="date" id="event-date">
            <input type="text" id="event-venue" placeholder="Venue">
            <button onclick="handleCreateEvent()">Create Event</button>
        </div>

        <div id="scan-section" class="tab-content hidden">
            <select id="event-dropdown" onchange="toggleScannerBtn()">
                <option value="">Select an Event</option>
            </select>
            <button id="open-cam-btn" class="hidden" onclick="startScanner()">Open Camera</button>
            <div id="reader"></div>
            <div id="status-msg"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
